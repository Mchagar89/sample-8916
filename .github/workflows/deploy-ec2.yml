name: Deploy to EC2 (OpenRedukti JNI)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: openredukti-spring
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build and push Docker image to ECR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-stage image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Cache C++ build layers between runs to speed up rebuilds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

  # ---------------------------------------------------------------------------
  # 2. Deploy new image on EC2 via SSH
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          port:        22
          script: |
            set -euo pipefail

            ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
            REPO="${{ env.ECR_REPOSITORY }}"
            TAG="${{ env.IMAGE_TAG }}"
            REGION="${{ secrets.AWS_REGION }}"
            CONTAINER="openredukti-spring"
            PORT=8080

            echo ">>> Authenticating with ECR..."
            aws ecr get-login-password --region "${REGION}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            echo ">>> Pulling ${ECR_REGISTRY}/${REPO}:${TAG}..."
            docker pull "${ECR_REGISTRY}/${REPO}:${TAG}"

            echo ">>> Stopping old container (if running)..."
            docker stop "${CONTAINER}" 2>/dev/null || true
            docker rm   "${CONTAINER}" 2>/dev/null || true

            echo ">>> Starting new container..."
            docker run -d \
              --name "${CONTAINER}" \
              --restart unless-stopped \
              -p "${PORT}:${PORT}" \
              -e SPRING_PROFILES_ACTIVE=prod \
              "${ECR_REGISTRY}/${REPO}:${TAG}"

            echo ">>> Waiting for health check..."
            for i in $(seq 1 12); do
              if curl -sf "http://localhost:${PORT}/actuator/health" > /dev/null 2>&1; then
                echo ">>> Service is healthy."
                exit 0
              fi
              echo "   attempt ${i}/12 – waiting 5s..."
              sleep 5
            done

            echo ">>> Health check failed. Showing logs:"
            docker logs --tail 50 "${CONTAINER}"
            exit 1

      - name: Print deployed URL
        run: |
          echo "Deployed to: http://${{ secrets.EC2_HOST }}:8080"
          echo "  Version : GET  http://${{ secrets.EC2_HOST }}:8080/api/redukti/version"
          echo "  Bootstrap: POST http://${{ secrets.EC2_HOST }}:8080/api/redukti/bootstrap"
          echo "  Value:     POST http://${{ secrets.EC2_HOST }}:8080/api/redukti/value"
